<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <style>
      nav {
        text-align: center;
        padding: 0px;
        margin: 0px;
        background-color: coral;
      }
      .container {
        display: flex;
        justify-content: space-around;
        width: 100%;
        height: 80vh;
        text-align: center;
      }
      main {
        width: 25%;
        padding: 10px;
        margin: 10px;
        border: 1px goldenrod;
        background-color: chocolate;
      }
      section {
        width: 25%;
        padding: 10px;
        margin: 10px;
        border: 1px goldenrod;
        background-color: beige;
      }
      article {
        width: 25%;
        padding: 10px;
        margin: 10px;
        border: 1px goldenrod;
        background-color: bisque;
      }
      aside {
        width: 25%;
        padding: 10px;
        margin: 10px;
        border: 1px goldenrod;
        background-color: burlywood;
      }
      h2 {
        color: rgb(143, 39, 7);
      }
      footer {
        text-align: center;
        background-color: aliceblue;
      }
    </style>
  </head>
  <body>
    <nav>
      <h2>Nav</h2>
    </nav>
    <div class="container">
      <main><h2>Main</h2></main>
      <section><h2>Section</h2></section>
      <article><h2>Article</h2></article>
      <aside><h2>Aside</h2></aside>
    </div>
    <footer><h2>Footer</h2></footer>
  </body>
</html>
